name: MLOps Pipeline

on:
  push:
    branches: [ "master", "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    
    steps:
    # 1 Code Checkout
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # 2 Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3 Install Dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install \
        pandas numpy scikit-learn mlflow joblib \
        fastapi uvicorn python-multipart \
        "pathspec==0.11.2" \
        "dvc[s3]==3.30.3" \
        "s3fs==2023.6.0" \
        "aiobotocore==2.5.0"

    # 4 DVC Pull
    - name: DVC Pull
      run: |
        # This removes any accidental whitespace/newlines
        export AWS_ACCESS_KEY_ID=$(echo "${{ secrets.AWS_ACCESS_KEY_ID }}" | tr -d '\r\n ')
        export AWS_SECRET_ACCESS_KEY=$(echo "${{ secrets.AWS_SECRET_ACCESS_KEY }}" | tr -d '\r\n ')
        export AWS_SESSION_TOKEN=$(echo "${{ secrets.AWS_SESSION_TOKEN }}" | tr -d '\r\n ')
        dvc pull

    # 5 Train Model
    - name: Train Model
      run: |
        python src/train.py --data data/v2/winequality.csv --model RandomForest --feature_selection

    # 6 Show Metrics
    - name: Show Metrics
      run: |
        echo "Generated Metrics:"
        cat metrics.json || echo "metrics.json not found"

    # 7 Upload MLflow results (Artifacts for persistence)
    - name: Upload MLflow results
      uses: actions/upload-artifact@v4
      with:
        name: mlruns
        path: mlruns/

    # 8 Upload Metrics
    - name: Upload Metrics
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: metrics.json

    # 9 Upload Model
    - name: Upload Model
      uses: actions/upload-artifact@v4
      with:
        name: model
        path: models/model.pkl

    # 10 Generate Summary
    - name: Generate Summary
      run: |
        echo "# Experiment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Name:** abelphilipjoseph" >> $GITHUB_STEP_SUMMARY
        echo "**Roll Number:** 2022bcs0068" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Metrics" >> $GITHUB_STEP_SUMMARY
        if [ -f metrics.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat metrics.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
        else
            echo "metrics.json NOT found" >> $GITHUB_STEP_SUMMARY
        fi

    # 10 Build & Login & Push Docker
    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/2022bcs0068-mlops:latest .

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/2022bcs0068-mlops:latest
